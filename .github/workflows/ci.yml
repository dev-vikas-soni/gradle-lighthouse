name: Gradle Lighthouse CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write  # For SARIF upload

jobs:
  build:
    name: Build (${{ matrix.os }}, Gradle ${{ matrix.gradle }}, JDK ${{ matrix.jdk }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        gradle: [ '8.5', '8.12' ]
        jdk: [ '17', '21' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.jdk }}

      - name: Setup Gradle ${{ matrix.gradle }}
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ matrix.gradle }}

      - name: Build Plugin
        run: ./gradlew build --no-daemon --stacktrace

      - name: Run on Example Project
        run: |
          cd example
          ../gradlew lighthouseAudit --no-daemon --stacktrace

      - name: Verify Configuration Cache
        run: ./gradlew lighthouseAudit --configuration-cache --no-daemon
        continue-on-error: true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.os }}-gradle${{ matrix.gradle }}-jdk${{ matrix.jdk }}
          path: |
            **/build/reports/lighthouse/
          retention-days: 7

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Audit
        run: ./gradlew lighthouseAudit --no-daemon

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: build/reports/lighthouse/
          category: gradle-lighthouse
